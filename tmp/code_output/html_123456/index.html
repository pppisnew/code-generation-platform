<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单任务记录工具</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        /* 容器样式 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        /* 头部样式 */
        header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 主内容区域 */
        main {
            padding: 30px;
        }
        
        /* 添加任务表单 */
        .add-task-form {
            display: flex;
            margin-bottom: 30px;
            gap: 10px;
        }
        
        #taskInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        #taskInput:focus {
            outline: none;
            border-color: #2575fc;
        }
        
        .add-btn {
            background-color: #2575fc;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .add-btn:hover {
            background-color: #1a68e8;
        }
        
        /* 任务列表区域 */
        .tasks-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2c3e50;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .task-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-btn {
            padding: 8px 16px;
            background-color: #f0f0f0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background-color: #2575fc;
            color: white;
        }
        
        .filter-btn:hover:not(.active) {
            background-color: #e0e0e0;
        }
        
        /* 任务列表 */
        #taskList {
            list-style-type: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 18px;
            background-color: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s;
            border-left: 4px solid #2575fc;
        }
        
        .task-item:hover {
            background-color: #f0f7ff;
            transform: translateY(-2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }
        
        .task-item.completed {
            opacity: 0.7;
            border-left-color: #4CAF50;
        }
        
        .task-checkbox {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        .task-text {
            flex: 1;
            font-size: 1.1rem;
        }
        
        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #777;
        }
        
        .delete-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .delete-btn:hover {
            background-color: #ff5252;
        }
        
        /* 空状态提示 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #777;
        }
        
        .empty-state.hidden {
            display: none;
        }
        
        /* 统计信息 */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.95rem;
        }
        
        /* 页脚 */
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                border-radius: 8px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .add-task-form {
                flex-direction: column;
            }
            
            .add-btn {
                padding: 15px;
            }
            
            .task-filters {
                flex-wrap: wrap;
            }
            
            .stats {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            main {
                padding: 20px;
            }
            
            .task-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .task-actions {
                display: flex;
                width: 100%;
                justify-content: space-between;
            }
            
            .task-checkbox {
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>简单任务记录工具</h1>
            <p class="subtitle">轻松添加、管理和跟踪您的日常任务。所有数据都保存在您的浏览器中。</p>
        </header>
        
        <main>
            <section class="add-task">
                <form class="add-task-form" id="taskForm">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="输入新任务，例如：完成项目报告" 
                        autocomplete="off"
                        required
                    >
                    <button type="submit" class="add-btn">添加任务</button>
                </form>
            </section>
            
            <section class="tasks-section">
                <h2>我的任务</h2>
                
                <div class="task-filters">
                    <button class="filter-btn active" data-filter="all">全部任务</button>
                    <button class="filter-btn" data-filter="active">进行中</button>
                    <button class="filter-btn" data-filter="completed">已完成</button>
                </div>
                
                <div class="empty-state" id="emptyState">
                    <p>暂无任务。添加您的第一个任务吧！</p>
                </div>
                
                <ul id="taskList">
                    <!-- 任务将通过JavaScript动态添加 -->
                </ul>
                
                <div class="stats">
                    <div class="total-tasks">总任务: <span id="totalTasks">0</span></div>
                    <div class="active-tasks">进行中: <span id="activeTasks">0</span></div>
                    <div class="completed-tasks">已完成: <span id="completedTasks">0</span></div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>© 2023 简单任务记录工具 | 数据存储在您的本地浏览器中</p>
        </footer>
    </div>

    <script>
        // 任务管理应用
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const taskForm = document.getElementById('taskForm');
            const taskInput = document.getElementById('taskInput');
            const taskList = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            // 统计元素
            const totalTasksEl = document.getElementById('totalTasks');
            const activeTasksEl = document.getElementById('activeTasks');
            const completedTasksEl = document.getElementById('completedTasks');
            
            // 当前过滤器
            let currentFilter = 'all';
            
            // 从本地存储加载任务，如果没有则初始化为空数组
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            
            // 初始化应用
            function initApp() {
                renderTasks();
                updateStats();
                updateEmptyState();
            }
            
            // 渲染任务列表
            function renderTasks() {
                // 清空当前列表
                taskList.innerHTML = '';
                
                // 根据当前过滤器筛选任务
                let filteredTasks = tasks;
                if (currentFilter === 'active') {
                    filteredTasks = tasks.filter(task => !task.completed);
                } else if (currentFilter === 'completed') {
                    filteredTasks = tasks.filter(task => task.completed);
                }
                
                // 如果筛选后没有任务，显示空状态
                if (filteredTasks.length === 0) {
                    emptyState.classList.remove('hidden');
                } else {
                    emptyState.classList.add('hidden');
                    
                    // 创建任务列表项
                    filteredTasks.forEach((task, index) => {
                        const taskItem = document.createElement('li');
                        taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                        taskItem.dataset.id = task.id;
                        
                        taskItem.innerHTML = `
                            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                            <span class="task-text">${escapeHtml(task.text)}</span>
                            <div class="task-actions">
                                <button class="delete-btn">删除</button>
                            </div>
                        `;
                        
                        // 添加事件监听器
                        const checkbox = taskItem.querySelector('.task-checkbox');
                        const deleteBtn = taskItem.querySelector('.delete-btn');
                        
                        checkbox.addEventListener('change', () => toggleTaskCompletion(task.id));
                        deleteBtn.addEventListener('click', () => deleteTask(task.id));
                        
                        taskList.appendChild(taskItem);
                    });
                }
            }
            
            // 添加新任务
            function addTask(text) {
                if (!text.trim()) return;
                
                const newTask = {
                    id: Date.now(), // 使用时间戳作为唯一ID
                    text: text.trim(),
                    completed: false,
                    createdAt: new Date().toISOString()
                };
                
                tasks.push(newTask);
                saveTasks();
                renderTasks();
                updateStats();
                updateEmptyState();
                
                // 清空输入框
                taskInput.value = '';
                taskInput.focus();
            }
            
            // 切换任务完成状态
            function toggleTaskCompletion(id) {
                tasks = tasks.map(task => {
                    if (task.id === id) {
                        return { ...task, completed: !task.completed };
                    }
                    return task;
                });
                
                saveTasks();
                renderTasks();
                updateStats();
            }
            
            // 删除任务
            function deleteTask(id) {
                tasks = tasks.filter(task => task.id !== id);
                saveTasks();
                renderTasks();
                updateStats();
                updateEmptyState();
            }
            
            // 更新任务统计
            function updateStats() {
                const total = tasks.length;
                const completed = tasks.filter(task => task.completed).length;
                const active = total - completed;
                
                totalTasksEl.textContent = total;
                activeTasksEl.textContent = active;
                completedTasksEl.textContent = completed;
            }
            
            // 更新空状态显示
            function updateEmptyState() {
                const hasTasks = tasks.length > 0;
                
                if (hasTasks) {
                    emptyState.classList.add('hidden');
                } else {
                    emptyState.classList.remove('hidden');
                }
            }
            
            // 保存任务到本地存储
            function saveTasks() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
            }
            
            // 简单的HTML转义函数，防止XSS攻击
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            // 事件监听器
            
            // 表单提交事件
            taskForm.addEventListener('submit', function(e) {
                e.preventDefault();
                addTask(taskInput.value);
            });
            
            // 过滤器按钮点击事件
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 移除所有按钮的active类
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    
                    // 为当前点击的按钮添加active类
                    this.classList.add('active');
                    
                    // 更新当前过滤器
                    currentFilter = this.dataset.filter;
                    
                    // 重新渲染任务列表
                    renderTasks();
                });
            });
            
            // 初始化应用
            initApp();
            
            // 添加一些示例任务（仅当没有任务时）
            if (tasks.length === 0) {
                const exampleTasks = [
                    "阅读一本新书",
                    "完成项目报告",
                    "去健身房锻炼",
                    "学习新的编程技能",
                    "整理工作空间"
                ];
                
                // 延迟添加示例任务，让用户先看到空状态
                setTimeout(() => {
                    exampleTasks.forEach((task, index) => {
                        setTimeout(() => {
                            addTask(task);
                        }, index * 200);
                    });
                }, 1000);
            }
        });
    </script>
</body>
</html>
